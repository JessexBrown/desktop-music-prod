name: CI

on:
  push:
  pull_request:

jobs:
  windows:
    name: Windows MSVC
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev --output-on-failure
