name: CI

on:
  push:
  pull_request:

jobs:
  windows:
    name: Windows MSVC App
    runs-on: windows-latest
    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cache/fetchcontent/windows-msvc

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Cache FetchContent downloads
        uses: actions/cache@v5
        with:
          path: .cache/fetchcontent/windows-msvc
          key: windows-fetchcontent-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            windows-fetchcontent-

      - name: Configure
        run: cmake --preset dev -DFETCHCONTENT_BASE_DIR="${env:FETCHCONTENT_BASE_DIR}"

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev --output-on-failure

  linux-core:
    name: Linux Core
    runs-on: ubuntu-latest
    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cache/fetchcontent/linux-core

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Cache FetchContent downloads
        uses: actions/cache@v5
        with:
          path: .cache/fetchcontent/linux-core
          key: linux-core-fetchcontent-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            linux-core-fetchcontent-

      - name: Configure core
        run: cmake --preset core-dev -DFETCHCONTENT_BASE_DIR="${FETCHCONTENT_BASE_DIR}"

      - name: Build core
        run: cmake --build --preset core-dev

      - name: Test core
        run: ctest --preset core-dev --output-on-failure

  linux-juce-app:
    name: Linux JUCE App
    runs-on: ubuntu-latest
    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cache/fetchcontent/linux-juce-app

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install JUCE app prerequisites
        run: |
          sudo apt update
          sudo apt install --no-install-recommends -y \
            build-essential \
            cmake \
            git \
            ninja-build \
            pkg-config \
            xvfb \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev

      - name: Cache FetchContent downloads
        uses: actions/cache@v5
        with:
          path: .cache/fetchcontent/linux-juce-app
          key: linux-juce-app-fetchcontent-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            linux-juce-app-fetchcontent-

      - name: Configure app
        run: cmake --preset dev-host -DFETCHCONTENT_BASE_DIR="${FETCHCONTENT_BASE_DIR}"

      - name: Build app
        run: cmake --build --preset dev-host

      - name: Test app
        run: xvfb-run -a ctest --preset dev-host --output-on-failure

      - name: Stage Linux JUCE app artifact
        run: |
          set -euo pipefail

          artifact_root="${RUNNER_TEMP}/rabbington-studio-linux-juce-app"
          rm -rf "${artifact_root}"
          mkdir -p "${artifact_root}/docs"

          mapfile -t app_candidates < <(
            find out/build/dev/projectname_artefacts \
              -type f \
              -name 'Rabbington Studio' \
              -perm -111 \
              | sort
          )

          if [ "${#app_candidates[@]}" -eq 0 ]; then
            mapfile -t app_candidates < <(
              find out/build/dev/projectname_artefacts \
                -type f \
                -name projectname \
                -perm -111 \
                | sort
            )
          fi

          if [ "${#app_candidates[@]}" -ne 1 ]; then
            echo "Expected exactly one Linux JUCE app executable candidate, found ${#app_candidates[@]}."
            find out/build/dev/projectname_artefacts -maxdepth 4 -type f -print || true
            exit 1
          fi

          cp "${app_candidates[0]}" "${artifact_root}/Rabbington Studio"
          chmod +x "${artifact_root}/Rabbington Studio"
          cp LICENSE "${artifact_root}/LICENSE"
          cp README.md "${artifact_root}/README.md"
          cp docs/DEPENDENCIES.md "${artifact_root}/docs/DEPENDENCIES.md"
          cat > "${artifact_root}/ARTIFACT.txt" <<'EOF'
          Rabbington Studio Linux JUCE App CI artifact.

          This artifact is produced only after the Linux JUCE App job builds and
          tests successfully. It contains the app executable plus first-party
          license/dependency notes, not FetchContent caches, source dependency
          checkouts, CMake build intermediates, test scratch data, plugins,
          presets, samples, or proprietary assets.
          EOF

          find "${artifact_root}" -maxdepth 3 -type f -print

      - name: Upload Linux JUCE app artifact
        uses: actions/upload-artifact@v7
        with:
          name: rabbington-studio-linux-juce-app-${{ github.sha }}
          path: ${{ runner.temp }}/rabbington-studio-linux-juce-app
          if-no-files-found: error
          retention-days: 7
